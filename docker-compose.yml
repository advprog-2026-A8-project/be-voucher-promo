services:
  voucher-postgres:
    image: postgres:15-alpine
    container_name: voucher-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voucherdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "7003:5432"
    volumes:
      - voucher_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-voucherdb}"]
      interval: 5s
      timeout: 5s
      retries: 20

  voucher-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voucher-app-dev
    depends_on:
      voucher-postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 7002
      POSTGRES_HOST: voucher-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-voucherdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    ports:
      - "7002:7002"

volumes:
  voucher_pgdata:
