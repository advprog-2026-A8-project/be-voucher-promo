on:
  push:
    branches: [ "staging", "main", "feat/cicd" ]
  pull_request:
    branches: [ "staging", "main", "feat/cicd" ]

jobs:
  test:
    name: Run Tests, Linter & Sonar
    runs-on: ubuntu-22.04

    permissions:
      contents: read
      pull-requests: read

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: orderdb
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run Tests & Checkstyle
        run: ./gradlew clean test checkstyleMain checkstyleTest
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/orderdb
          SPRING_DATASOURCE_USERNAME: ${{ secrets.POSTGRES_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      - name: SonarCloud Scan (PR)
        if: github.event_name == 'pull_request'
        run: ./gradlew sonar -Dsonar.gradle.skipCompile=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarCloud Scan (Branch)
        if: github.event_name == 'push'
        run: ./gradlew sonar -Dsonar.pullrequest.key= -Dsonar.gradle.skipCompile=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN