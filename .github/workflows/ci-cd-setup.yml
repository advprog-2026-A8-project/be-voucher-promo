name: CI/CD Pipeline

on:
  push:
    branches: [ "staging", "main", "feat/cicd-setup" ]
  pull_request:
    branches: [ "staging", "main", "feat/cicd-setup" ]

jobs:
  test:
    name: Run Tests, Linter & Sonar
    runs-on: ubuntu-22.04

    permissions:
      contents: read
      pull-requests: read

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: voucherdb
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run Tests & Checkstyle
        run: ./gradlew clean test checkstyleMain checkstyleTest
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/voucherdb
          SPRING_DATASOURCE_USERNAME: ${{ secrets.POSTGRES_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      - name: SonarCloud Scan
        run: ./gradlew sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-deploy:
    name: Build and Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')

    steps:
      - name: Set environment variables
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "APP_PORT=7000" >> $GITHUB_ENV
            echo "CONTAINER_NAME=voucher_prod" >> $GITHUB_ENV
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
            echo "DB_CONTAINER_NAME=postgres_voucher_prod" >> $GITHUB_ENV
            echo "DB_NAME=voucherdb_prod" >> $GITHUB_ENV
            echo "DB_PORT=7001" >> $GITHUB_ENV
            echo "DB_VOLUME=postgres_data_prod" >> $GITHUB_ENV
          else
            echo "APP_PORT=7002" >> $GITHUB_ENV
            echo "CONTAINER_NAME=voucher_staging" >> $GITHUB_ENV
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
            echo "DB_CONTAINER_NAME=postgres_voucher_staging" >> $GITHUB_ENV
            echo "DB_NAME=voucherdb_staging" >> $GITHUB_ENV
            echo "DB_PORT=7002" >> $GITHUB_ENV
            echo "DB_VOLUME=postgres_data_staging" >> $GITHUB_ENV
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPO_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          REMOTE_DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          REMOTE_DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          REMOTE_POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          REMOTE_POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REMOTE_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REMOTE_JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: REMOTE_DOCKER_HUB_USERNAME,REMOTE_DOCKER_HUB_ACCESS_TOKEN,REMOTE_POSTGRES_USER,REMOTE_POSTGRES_PASSWORD,REMOTE_JWT_SECRET,REMOTE_JWT_EXPIRATION
          script: |
            set -euo pipefail

            # Stop old app container
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true

            # Login Docker di server
            echo "$REMOTE_DOCKER_HUB_ACCESS_TOKEN" | docker login -u "$REMOTE_DOCKER_HUB_USERNAME" --password-stdin

            # Pull image terbaru
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPO_NAME }}:${{ env.IMAGE_TAG }}

            # Create network
            docker network create app_network || true

            # Cleanup old shared postgres (migration)
            docker stop postgres_db || true
            docker rm postgres_db || true

            # Setup database container
            if [ "$(docker ps -aq -f name=^${{ env.DB_CONTAINER_NAME }}$)" ]; then
              docker start ${{ env.DB_CONTAINER_NAME }} || true
            else
              docker run -d \
                --name=${{ env.DB_CONTAINER_NAME }} \
                --network=app_network \
                -p ${{ env.DB_PORT }}:5432 \
                -v ${{ env.DB_VOLUME }}:/var/lib/postgresql/data \
                -e POSTGRES_DB=${{ env.DB_NAME }} \
                -e POSTGRES_USER="$REMOTE_POSTGRES_USER" \
                -e POSTGRES_PASSWORD="$REMOTE_POSTGRES_PASSWORD" \
                --restart always \
                postgres:15-alpine
            fi

            # Run app container
            docker run -d \
              --name=${{ env.CONTAINER_NAME }} \
              --network=app_network \
              -p ${{ env.APP_PORT }}:8080 \
              -e SERVER_PORT=8080 \
              -e POSTGRES_HOST=${{ env.DB_CONTAINER_NAME }} \
              -e POSTGRES_PORT=5432 \
              -e POSTGRES_DB=${{ env.DB_NAME }} \
              -e POSTGRES_USER="$REMOTE_POSTGRES_USER" \
              -e POSTGRES_PASSWORD="$REMOTE_POSTGRES_PASSWORD" \
              -e JWT_SECRET="$REMOTE_JWT_SECRET" \
              -e JWT_EXPIRATION="$REMOTE_JWT_EXPIRATION" \
              -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
              --restart always \
              ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPO_NAME }}:${{ env.IMAGE_TAG }}

            docker ps